<html lang="sv">
<head>
  <meta charset="UTF-8" />

  <meta property="og:type" content="website" />

  <meta property="og:title" content="XMC Sverige AB" />
  <meta property="og:description" content="Bolaget bakom Spready (e-postmarknadsföring) och andra verksamheter inom media och marknadsföring." />
  <meta property="og:locale" content="sv_SE" />

    "address": {
      "@type": "PostalAddress",

      "addressCountry": "SE"
    },
    "subOrganization": [
      {
        "@type": "Organization",
        "name": "Spready",
        "url": "https://spready.se",
        "description": "Kraftfulla lösningar för lyckad e-postmarknadsföring"

        "@type": "Organization",

      }
    ]

  </script>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,300;12..96,400;12..96,600;12..96,800&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --blue: #00aeef;
      --ink: #0e0e0d;
      --muted: #adadaa;
      --subtle: #c8c8c4;
      --bg: #f6f6f4;
      --hover: #efefec;
    }

    html, body { height: 100%; }

    body {
      font-family: 'Bricolage Grotesque', sans-serif;
      background: var(--bg);
      color: var(--ink);
      min-height: 100vh;
      display: grid;
      grid-template-rows: auto 1fr auto;
      border-top: 3px solid var(--blue);
    }

    .wrap {
      max-width: 1040px;
      margin: 0 auto;
      width: 100%;
      padding-left: clamp(1.8rem, 6vw, 6rem);
      padding-right: clamp(1.8rem, 6vw, 6rem);
    }

    /* ── header ── */
    header { padding: 2.4rem 0; }

    .logo {
      height: 22px;
      width: auto;
      display: block;
    }

    /* ── main ── */
    main {
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 2rem 0 6rem;
    }

    /* ── ventures ── */
    .venture {
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      padding: 2.6rem 2rem;
      border-bottom: 1px solid var(--subtle);
      text-decoration: none;
      color: var(--ink);
      position: relative;
      overflow: hidden;
      transition: color 0.22s;
      gap: 1.2rem;
    }

    .venture:first-of-type { border-top: 1px solid var(--subtle); }

    .venture::after {
      content: '';
      position: absolute;
      inset: 0;
      background: var(--hover);
      transform: translateX(-101%);
      transition: transform 0.32s cubic-bezier(0.4, 0, 0.2, 1);
      z-index: 0;
    }

    .venture:hover::after { transform: translateX(0); }
    .venture:hover { color: var(--blue); }

    .venture-desc {
      position: relative;
      z-index: 1;
      font-size: clamp(1.6rem, 3.5vw, 2.6rem);
      font-weight: 300;
      letter-spacing: -0.02em;
      line-height: 1.15;
      color: var(--ink);
      transition: color 0.22s;
    }

    .venture:hover .venture-desc { color: var(--blue); }

    .venture-footer {
      position: relative;
      z-index: 1;
      width: 100%;
      display: flex;
      justify-content: flex-end;
      align-items: center;
      gap: 0.4rem;
    }

    .venture-name {
      font-size: 0.78rem;
      font-weight: 600;
      letter-spacing: 0.04em;
      color: var(--muted);
      transition: color 0.22s;
    }

    .venture:hover .venture-name { color: var(--blue); }

    .venture-arrow {
      font-size: 0.9rem;
      color: var(--muted);
      transition: color 0.22s, transform 0.22s;
    }

    .venture:hover .venture-arrow {
      color: var(--blue);
      transform: translateX(4px);
    }

    /* ── footer ── */
    footer {
      border-top: 1px solid var(--subtle);
    }

    .footer-inner {
      padding-top: 1.8rem;
      padding-bottom: 2rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 2rem;
      flex-wrap: wrap;
    }

    .footer-name {
      font-size: 0.68rem;
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--muted);
    }

    .footer-contact {
      display: flex;
      gap: 2rem;
      flex-wrap: wrap;
    }

    .footer-contact a, .footer-contact span {
      font-size: 0.75rem;
      font-weight: 300;
      color: var(--muted);
      text-decoration: none;
      transition: color 0.15s;
    }

    .footer-contact a:hover { color: var(--ink); }

    .sr-only {
      position: absolute;
      width: 1px; height: 1px;
      padding: 0; margin: -1px;
      overflow: hidden;
      clip: rect(0,0,0,0);
      white-space: nowrap;
      border: 0;
    }

    @media (max-width: 560px) {
      .venture-label { display: none; }
      .footer-inner { flex-direction: column; align-items: flex-start; gap: 0.6rem; }
      .footer-contact { flex-direction: column; gap: 0.35rem; }
    }
  </style>
</head>
<body>

  <header>
    <div class="wrap">
      <img class="logo" src="logo.png" alt="XMC Sverige AB" />
      <h1 class="sr-only">XMC Sverige AB</h1>
    </div>
  </header>

  <main>
    <div class="wrap">
      <a class="venture" href="https://spready.se" target="_blank" rel="noopener">
        <span class="venture-desc">Kraftfulla lösningar för lyckad e-postmarknadsföring</span>
        <div class="venture-footer">
          <span class="venture-name">Spready</span>
          <span class="venture-arrow" aria-hidden="true">→</span>
        </div>
      </a>
      <a class="venture" href="https://robin.calmegard.se" target="_blank" rel="noopener">
        <span class="venture-desc">Voiceovers, föreläsningar och mediaproduktion</span>
        <div class="venture-footer">
          <span class="venture-name">Robin Calmegård</span>
          <span class="venture-arrow" aria-hidden="true">→</span>
        </div>
      </a>
    </div>
  </main>

  <footer>
    <div class="wrap footer-inner">
      <span class="footer-name">XMC Sverige AB</span>
      <div class="footer-contact">
        <span>Box 1451, 116 74 Stockholm</span>
        <a href="tel:+4684037200">08-403 720 00</a>
        <a href="mailto:info@xmc.se">info@xmc.se</a>
      </div>
    </div>
  </footer>

</body>
</html>
